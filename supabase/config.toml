[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "exp://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081", "exp://127.0.0.1:8081", "glow://*", "glow://reset-password", "https://wvejvinngszpsaqqzjqw.supabase.co/functions/v1/auth-redirect"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.analyze-skin]
verify_jwt = false

[functions.generate-plan]
verify_jwt = false

[functions.scan-product]
verify_jwt = false

[functions.track-progress]
verify_jwt = false
